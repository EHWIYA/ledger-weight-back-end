name: Deploy Ledger Weight Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ehwiya/ledger-weight-back-end

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}

  deploy-to-nas:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Connect to Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TS_AUTH_KEY }} --accept-routes
          sleep 5
          tailscale status

      - name: Deploy on NAS (docker compose)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: 100.88.40.125
          username: ${{ secrets.NAS_SERVER_USER }}
          key: ${{ secrets.NAS_SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /home/iwh/ledger-weight

            docker compose pull ledger-weight-api
            docker compose up -d ledger-weight-api
            docker compose ps

            echo "Starting health check for ledger-weight-api..."

            # 최대 10번, 2초 간격으로 /health 헬스 체크
            for i in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:8088/health > /dev/null; then
                echo "Health check passed"
                echo "Deployment completed at $(date)"
                exit 0
              fi

              echo "Health check failed, retrying... ($i/10)"
              sleep 2
            done

            echo "Health check failed after retries, printing recent logs..."
            docker compose logs --tail=200 ledger-weight-api || true
            exit 1
